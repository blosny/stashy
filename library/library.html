<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="page-title">Stashy — Games Library</title>
<style>
  :root {
    --bg-main: #18181b;
    --bg-card: #27272a;
    --border-color: rgba(255, 255, 255, 0.08);
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --primary-color: #4f46e5;
    --steam-color: #66c0f4;
    --epic-color: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 24px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 16px;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo .icon {
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    border: 1px solid var(--border-color);
  }

  .header-logo h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .header-logo p {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* Stats Section */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background-color 0.2s;
  }

  .stat-card:hover {
    background: #3f3f46;
  }

  .stat-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border: 1px solid var(--border-color);
    background: rgba(0, 0, 0, 0.15);
  }

  .stat-icon.total { color: #a5b4fc; }
  .stat-icon.steam { color: var(--steam-color); }
  .stat-icon.epic { color: #fff; }

  .stat-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
  }

  /* Dashboard Section */
  .dashboard {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .filters-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 260px;
  }

  .search-input {
    width: 100%;
    padding: 10px 14px 10px 36px;
    background: rgba(0, 0, 0, 0.15);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    outline: none;
    border-color: var(--primary-color);
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    pointer-events: none;
    font-size: 12px;
  }

  .filter-buttons {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    background: rgba(255, 255, 255, 0.04);
    color: #fff;
  }

  .filter-btn.active {
    background: var(--primary-color);
    border-color: var(--primary-color);
    color: #fff;
  }

  /* Library Table */
  .table-wrapper {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    background: rgba(0, 0, 0, 0.1);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 13px;
  }

  th {
    background: rgba(0, 0, 0, 0.2);
    padding: 10px 16px;
    font-weight: 700;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border-color);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-primary);
  }

  tr:last-child td {
    border-bottom: none;
  }

  tr {
    transition: background-color 0.15s;
  }

  tr:hover td {
    background: rgba(255, 255, 255, 0.02);
  }

  .game-title {
    font-weight: 600;
    color: #fff;
  }

  .platform-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10.5px;
    font-weight: 600;
  }

  .platform-badge.steam {
    background: rgba(102, 192, 244, 0.1);
    color: var(--steam-color);
    border: 1px solid rgba(102, 192, 244, 0.15);
  }

  .platform-badge.epic {
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .no-results {
    padding: 30px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <div class="header-logo">
      <div class="icon">🛡️</div>
      <div>
        <h1 id="lib-title">Stashy</h1>
        <p id="lib-subtitle">Unified Games Library</p>
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon total">📚</div>
      <div class="stat-info">
        <span class="stat-label" id="lib-total-label">Total Unique Games</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon steam">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 .007c-5.59 0-10.25 3.903-11.53 9.17l5.96 2.47a3.54 3.54 0 0 1 3.5-1.57l3.19-4.57a3.53 3.53 0 0 1 3.53-2.94 3.55 3.55 0 0 1 3.55 3.55 3.55 3.55 0 0 1-3.55 3.55c-.71 0-1.37-.21-1.92-.57l-4.52 3.23c.04.22.06.44.06.67a3.55 3.55 0 0 1-3.55 3.55c-1.3 0-2.45-.71-3.08-1.78l-5.69-2.36A12 12 0 0 0 12 24c6.63 0 12-5.37 12-12S18.63.007 12 .007zm-2.92 13.91a1.64 1.64 0 0 0 1.64-1.64c0-.9-.73-1.64-1.64-1.64a1.64 1.64 0 0 0-1.64 1.64c0 .91.74 1.64 1.64 1.64z"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-label" id="lib-steam-label">Steam Games</span>
        <span class="stat-value" id="stat-steam">0</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon epic">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 0L1.75 3v13.5L12 24l10.25-7.5V3L12 0zm7.64 15.54L12 21.05l-7.64-5.51v-9.6L12 8.78l7.64-2.84v9.6zM12 9.92c-.67 0-1.2-.53-1.2-1.2s.53-1.2 1.2-1.2 1.2.53 1.2 1.2-.53 1.2-1.2 1.2z"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-label" id="lib-epic-label">Epic Games Games</span>
        <span class="stat-value" id="stat-epic">0</span>
      </div>
    </div>
  </div>

  <div class="dashboard">
    <div class="filters-row">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-box">
      </div>
      <div class="filter-buttons">
        <button class="filter-btn active" id="btn-filter-all">All</button>
        <button class="filter-btn" id="btn-filter-steam">Steam</button>
        <button class="filter-btn" id="btn-filter-epic">Epic Games</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="library-table">
        <thead>
          <tr>
            <th style="width: 65%" id="th-title">Game Title</th>
            <th style="width: 35%" id="th-platform">Platform</th>
          </tr>
        </thead>
        <tbody id="library-body">
          <!-- Loaded dynamically -->
        </tbody>
      </table>
      <div id="no-results-msg" class="no-results" style="display: none;">
        No games found matching your search.
      </div>
    </div>
  </div>

</div>

<script src="library.js"></script>
</body>
</html>
