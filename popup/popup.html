<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stashy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-main: #09090b;
    --bg-card: #121212;
    --bg-hover: #18181b;
    --border-color: #27272a;
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --accent: #10b981;
    --steam-color: #38bdf8;
    --epic-color: #f8fafc;
    --danger-color: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 340px;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    font-size: 13px;
    overflow: hidden;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-main);
  }

  .logo-icon {
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: var(--bg-card);
    border-radius: 6px;
    border: 1px solid var(--border-color);
  }

  .header h1 {
    font-size: 15px;
    font-weight: 800;
    color: var(--text-primary);
    flex: 1;
    letter-spacing: -0.01em;
  }

  .lang-selector {
    display: inline-flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 2px;
    gap: 2px;
  }

  .lang-pill {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-secondary);
    padding: 3px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .lang-pill:hover {
    color: var(--text-primary);
  }

  .lang-pill.active {
    background: var(--border-color);
    color: #fff;
  }

  #content {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .platform-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s ease;
    position: relative;
  }

  .platform-card:hover {
    background: var(--bg-hover);
    border-color: #3f3f46;
  }

  .platform-card::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: -1px; width: 3px;
    background: transparent;
    border-radius: 3px 0 0 3px;
    transition: background 0.2s ease;
  }

  .platform-card.steam-card:hover::before { background: var(--steam-color); }
  .platform-card.epic-card:hover::before { background: var(--epic-color); }

  .platform-icon-wrapper {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--bg-main);
    border: 1px solid var(--border-color);
  }

  .platform-icon-wrapper.steam { color: var(--steam-color); }
  .platform-icon-wrapper.epic { color: var(--epic-color); }

  .platform-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .platform-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .platform-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--text-primary);
  }

  .status-indicator-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  .status-indicator-dot.active {
    background-color: var(--accent);
  }

  .status-indicator-dot.inactive {
    background-color: #52525b;
  }

  .platform-meta {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .platform-meta strong {
    color: var(--text-primary);
  }

  .sync-banner {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sync-banner-title {
    font-weight: 700;
    font-size: 11px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-banner-text {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .action-footer {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-sync-row {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .btn {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    background: var(--bg-card);
    color: var(--text-primary);
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn:hover {
    background: var(--bg-hover);
    border-color: #3f3f46;
  }

  .btn-sync-steam { flex: 1; }
  .btn-sync-epic { flex: 1; }

  .btn-library-show {
    width: 100%;
    background: var(--text-primary);
    color: var(--bg-main);
    border: none;
    font-weight: 700;
    font-size: 12px;
    padding: 10px;
  }

  .btn-library-show:hover {
    background: #ffffff;
  }

  .btn-danger-reset {
    width: 100%;
    font-size: 10px;
    color: var(--text-secondary);
    background: transparent;
    border: none;
    padding: 4px;
    margin-top: 4px;
  }

  .btn-danger-reset:hover {
    color: var(--danger-color);
    background: transparent;
    text-decoration: underline;
  }

  .loading {
    color: var(--text-secondary);
    font-size: 11px;
    padding: 30px 0;
    text-align: center;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="header">
  <span class="logo-icon">🛡️</span>
  <h1>Stashy</h1>
  <div class="lang-selector" id="lang-toggle">
    <span class="lang-pill" id="lang-en">EN</span>
    <span class="lang-pill" id="lang-tr">TR</span>
  </div>
</div>

<div id="content">
  <div class="loading">LOADING...</div>
</div>

<script src="popup.js"></script>
</body>
</html>
